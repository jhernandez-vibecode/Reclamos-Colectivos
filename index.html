<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamos Colectivos — SDI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --navy:#07091a; --card:#111828; --border:rgba(255,255,255,.07); --cyan:#00d4ff; --muted:#64748b; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(0,212,255,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(99,102,241,.07) 0%,transparent 55%);pointer-events:none;}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.25;animation:float 12s ease-in-out infinite;pointer-events:none;}
  .orb1{width:500px;height:500px;background:#00d4ff;top:-120px;left:-100px;}
  .orb2{width:400px;height:400px;background:#6366f1;bottom:-100px;right:-80px;animation-delay:-5s;}
  @keyframes float{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,20px);}}
  .card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 48px;width:440px;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:up .5s cubic-bezier(.16,1,.3,1) both;}
  @keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
  .logo-wrap{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
  .logo-icon{width:46px;height:46px;background:linear-gradient(135deg,#00d4ff,#6366f1);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 8px 24px rgba(0,212,255,.3);}
  .logo-text h1{font-family:'Outfit',sans-serif;font-size:19px;font-weight:700;color:#e2e8f8;letter-spacing:-.2px;}
  .logo-text span{font-size:11px;color:var(--muted);letter-spacing:.3px;}
  .divider{height:1px;background:var(--border);margin:0 0 28px;}
  .tagline{font-family:'Outfit',sans-serif;font-size:26px;font-weight:700;color:#e2e8f8;line-height:1.2;margin-bottom:8px;}
  .tagline em{font-style:normal;color:var(--cyan);}
  .sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;}
  .form-label{font-size:12px;font-weight:600;color:#94a3b8;letter-spacing:.3px;display:block;margin-bottom:8px;}
  .pin-wrap{position:relative;margin-bottom:16px;}
  .pin-input{
    width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);
    color:#e2e8f8;padding:14px 46px 14px 16px;border-radius:12px;
    font-size:16px;font-family:'DM Sans',sans-serif;outline:none;
    letter-spacing:3px;transition:.2s;
  }
  .pin-input:focus{border-color:rgba(0,212,255,.5);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
  .pin-input::placeholder{letter-spacing:normal;color:#475569;}
  .pin-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:4px;}
  .btn-enter{
    width:100%;background:var(--cyan);color:#07091a;border:none;
    border-radius:12px;padding:15px;font-size:15px;font-weight:700;
    font-family:'DM Sans',sans-serif;cursor:pointer;transition:.2s;
    letter-spacing:.2px;
  }
  .btn-enter:hover{background:#00bcee;box-shadow:0 6px 24px rgba(0,212,255,.4);}
  .btn-enter:disabled{opacity:.5;cursor:not-allowed;}
  #error-msg{display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:14px;text-align:center;}
  .note{text-align:center;font-size:12px;color:var(--muted);margin-top:18px;}
  #loading-overlay{display:none;position:fixed;inset:0;background:var(--navy);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  #loading-overlay.show{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid rgba(0,212,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">
      <h1>Reclamos Colectivos</h1>
      <span>SEGUROS DEL INS · VTM 805</span>
    </div>
  </div>
  <div class="divider"></div>
  <p class="tagline">Gestión de<br><em>Pólizas de Vida</em></p>
  <p class="sub">Sistema de seguimiento de reclamos para la póliza colectiva — Asoc. Cultural y Educativa para la Policía.</p>

  <label class="form-label" for="pin-input">CLAVE DE ACCESO</label>
  <div id="error-msg"></div>
  <div class="pin-wrap">
    <input class="pin-input" id="pin-input" type="password" placeholder="Ingrese su clave" autocomplete="off" maxlength="20">
    <button class="pin-toggle" id="pin-toggle" type="button" onclick="togglePin()">👁</button>
  </div>
  <button class="btn-enter" id="btn-enter" onclick="doLogin()">Ingresar →</button>
  <p class="note">Acceso restringido · Seguros del INS</p>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:13px;">Verificando…</p>
</div>

<script>
  const DEMO = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

  document.getElementById('pin-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
    document.getElementById('error-msg').style.display = 'none';
  });

  function togglePin() {
    const inp = document.getElementById('pin-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    const pin = document.getElementById('pin-input').value.trim();
    if (!pin) return;
    const btn = document.getElementById('btn-enter');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    err.style.display = 'none';

    try {
      if (DEMO) {
        // Local: acepta cualquier PIN para demo
        sessionStorage.setItem('rc-token', btoa(pin + ':reclamos'));
        sessionStorage.setItem('rc-demo', '1');
        document.getElementById('loading-overlay').classList.add('show');
        window.location.href = 'app.html';
        return;
      }
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      });
      const data = await res.json();
      if (data.ok) {
        sessionStorage.setItem('rc-token', data.token);
        document.getElementById('loading-overlay').classList.add('show');
        window.location.href = 'app.html';
      } else {
        err.textContent = 'Clave incorrecta. Intente de nuevo.';
        err.style.display = 'block';
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
      }
    } catch(e) {
      err.textContent = 'Error de conexión. Intente de nuevo.';
      err.style.display = 'block';
    }
    btn.disabled = false;
  }

  // Si ya tiene sesión activa, saltar al app
  if (sessionStorage.getItem('rc-token')) {
    window.location.href = 'app.html';
  }
</script>
</body>
</html>
