<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclamos Colectivos — SDI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #07091a;
    --surface: #0d1226;
    --card: #111828;
    --border: rgba(255,255,255,.07);
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,.12);
    --text: #e2e8f8;
    --muted: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background:var(--navy);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'DM Sans',sans-serif;
    overflow:hidden;
  }
  /* animated background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(0,212,255,.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(99,102,241,.07) 0%, transparent 55%);
    pointer-events:none;
  }
  .orb {
    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    opacity:.25;
    animation:float 12s ease-in-out infinite;
    pointer-events:none;
  }
  .orb1 { width:500px;height:500px;background:#00d4ff;top:-120px;left:-100px;animation-delay:0s; }
  .orb2 { width:400px;height:400px;background:#6366f1;bottom:-100px;right:-80px;animation-delay:-5s; }
  @keyframes float {
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(30px,20px);}
  }

  .card {
    position:relative;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 52px;
    width:460px;
    backdrop-filter:blur(20px);
    box-shadow:0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(0,212,255,.06);
    animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp {
    from{opacity:0;transform:translateY(32px);}
    to{opacity:1;transform:translateY(0);}
  }
  .logo-wrap {
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:36px;
  }
  .logo-icon {
    width:48px;height:48px;
    background:linear-gradient(135deg,#00d4ff,#6366f1);
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    box-shadow:0 8px 24px rgba(0,212,255,.3);
  }
  .logo-text h1 {
    font-family:'Outfit',sans-serif;
    font-size:20px;font-weight:700;
    color:var(--text);letter-spacing:-.3px;
  }
  .logo-text span {
    font-size:12px;color:var(--muted);font-weight:400;letter-spacing:.3px;
  }
  .divider { height:1px;background:var(--border);margin:0 0 32px; }
  .tagline {
    font-family:'Outfit',sans-serif;
    font-size:28px;font-weight:700;
    color:var(--text);
    line-height:1.2;
    margin-bottom:10px;
  }
  .tagline em { font-style:normal;color:var(--cyan); }
  .sub {
    font-size:14px;color:var(--muted);
    line-height:1.6;
    margin-bottom:36px;
  }
  .btn-google {
    width:100%;
    display:flex;align-items:center;justify-content:center;gap:12px;
    background:white;
    color:#1a1a2e;
    border:none;
    border-radius:14px;
    padding:16px 24px;
    font-size:15px;font-weight:600;
    font-family:'DM Sans',sans-serif;
    cursor:pointer;
    transition:all .2s;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
  }
  .btn-google:hover { transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4); }
  .btn-google:active { transform:translateY(0); }
  .btn-google img { width:20px;height:20px; }
  .note {
    text-align:center;
    font-size:12px;color:var(--muted);
    margin-top:20px;
    line-height:1.6;
  }
  .note strong { color:var(--cyan); }
  #error-msg {
    display:none;
    background:rgba(239,68,68,.12);
    border:1px solid rgba(239,68,68,.3);
    color:#fca5a5;
    border-radius:10px;
    padding:12px 16px;
    font-size:13px;
    margin-top:16px;
    text-align:center;
  }
  #loading-overlay {
    display:none;
    position:fixed;inset:0;
    background:var(--navy);
    z-index:999;
    align-items:center;justify-content:center;
    flex-direction:column;gap:20px;
  }
  #loading-overlay.show { display:flex; }
  .spinner {
    width:40px;height:40px;
    border:3px solid rgba(0,212,255,.2);
    border-top-color:var(--cyan);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">
      <h1>Reclamos Colectivos</h1>
      <span>SEGUROS DEL INS · AGENTES</span>
    </div>
  </div>
  <div class="divider"></div>
  <p class="tagline">Gestión de<br><em>Pólizas de Vida</em></p>
  <p class="sub">Sistema de seguimiento de reclamos para la póliza colectiva VTM 805 — Asoc. Cultural y Educativa para la Policía.</p>
  <button class="btn-google" id="btn-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Continuar con Google
  </button>
  <div id="error-msg"></div>
  <p class="note" id="note-text">Acceso exclusivo para usuarios <strong>@segurosdelins.com</strong></p>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="color:#64748b;font-size:14px;">Verificando credenciales…</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const DEMO_MODE = FIREBASE_CONFIG.apiKey === 'FIREBASE_API_KEY';

  const btnLogin = document.getElementById('btn-login');
  const errorMsg = document.getElementById('error-msg');
  const overlay  = document.getElementById('loading-overlay');
  const noteText = document.getElementById('note-text');

  if (DEMO_MODE) {
    // Sin Firebase configurado → acceso directo al demo
    noteText.innerHTML = '⚡ <strong style="color:var(--cyan)">Modo Demo</strong> — Firebase no configurado aún';
    btnLogin.addEventListener('click', () => {
      overlay.classList.add('show');
      window.location.href = 'app.html';
    });
  } else {
    firebase.initializeApp(FIREBASE_CONFIG);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ hd: 'segurosdelins.com' });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    btnLogin.addEventListener('click', async () => {
      errorMsg.style.display = 'none';
      try {
        const result = await auth.signInWithPopup(provider);
        const email = result.user.email;
        if (!email.endsWith('@segurosdelins.com')) {
          await auth.signOut();
          showError('Acceso denegado. Solo usuarios @segurosdelins.com pueden ingresar.');
          return;
        }
        overlay.classList.add('show');
        window.location.href = 'app.html';
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') {
          showError('Error al iniciar sesión. Intente de nuevo.');
        }
      }
    });

    auth.onAuthStateChanged(user => {
      if (user && user.email && user.email.endsWith('@segurosdelins.com')) {
        overlay.classList.add('show');
        window.location.href = 'app.html';
      }
    });
  }
</script>
</body>
</html>
